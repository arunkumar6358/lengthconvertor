<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Length Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Length Calculator</h2>

    <div class="unitList">
        FROM:
        <select id="fromUnit">
            <option value="meter">Meter</option>
            <option value="kilometer">Kilometer</option>
            <option value="centimeter">Centimeter</option>
            <option value="millimeter">Millimeter</option>
            <option value="micrometer">Micrometer</option>
            <option value="nanometer">Nanometer</option>
            <option value="mile">Mile</option>
            <option value="yard">Yard</option>
            <option value="foot">Foot</option>
            <option value="inch">Inch</option>
            <option value="lightyear">Light Year</option>
        </select>

        TO:
        <select id="toUnit">
            <option value="meter">Meter</option>
            <option value="kilometer">Kilometer</option>
            <option value="centimeter">Centimeter</option>
            <option value="millimeter">Millimeter</option>
            <option value="micrometer">Micrometer</option>
            <option value="nanometer">Nanometer</option>
            <option value="mile">Mile</option>
            <option value="yard">Yard</option>
            <option value="foot">Foot</option>
            <option value="inch">Inch</option>
            <option value="lightyear">Light Year</option>
        </select>
    </div>

    <br>

    <input type="number" placeholder="Enter value" id="inputValue">

    <br><br>

    <button onclick="convertLength()" id="calculate">Convert</button>

    <h3 id="result"></h3>
</div>

<script src="script.js"></script>
</body>
</html>
